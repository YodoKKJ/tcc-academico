spring.application.name=academico

server.port=${PORT:8080}

# Railway injeta PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD automaticamente
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:tcc_academico}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:123}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Em produção frontend e backend estão na mesma origem — apenas dev precisa de CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}
