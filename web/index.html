<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Acadêmico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Tela de carregamento -->
  <div id="loading-screen">
    <div class="loading-inner">
      <div class="spinner"></div>
      <p>Iniciando banco de dados…</p>
    </div>
  </div>

  <!-- Shell do app (oculto até o banco estar pronto) -->
  <div id="app" style="display:none">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">A</div>
        <div>
          <div class="logo-name">Acadêmico</div>
          <div class="logo-sub">Sistema Escolar</div>
        </div>
      </div>
      <nav id="sidebar-nav"></nav>
    </aside>
    <div class="content-area">
      <div id="page"></div>
    </div>
  </div>

  <!-- Containers para modal e toast -->
  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <!-- SQL.js via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>

  <!-- Módulos da aplicação -->
  <script src="js/icons.js"></script>
  <script src="js/db.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
